name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-test-and-build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 10.0.x

      - name: Validate Windows PowerShell scripts
        shell: pwsh
        run: |
          $parseErrors = @()
          Get-ChildItem .\Windows -Filter *.ps1 -Recurse | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName,
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            $parseErrors += $errors
          }

          if ($parseErrors.Count -gt 0) {
            $parseErrors | ForEach-Object { Write-Host "::error::$($_.Message)" }
            throw "PowerShell script validation failed."
          }

      - name: Run Windows tests and build x64 application
        shell: pwsh
        run: .\Windows\Scripts\Test.ps1 -Platform x64

      - name: Build ARM64 application and thumbnail provider
        shell: pwsh
        run: .\Windows\Scripts\Build.ps1 -Platforms ARM64

      - name: Prepare Windows CI applications
        shell: pwsh
        run: .\Windows\Scripts\Package-CIArtifacts.ps1

      - name: Upload Windows x64 application for downstream jobs
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: BundlePack-Windows-x64-intermediate-${{ github.run_id }}
          path: .build/artifacts/BundlePack-Windows-x64
          if-no-files-found: error
          retention-days: 1
          compression-level: 6

      - name: Upload Windows ARM64 application for downstream jobs
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: BundlePack-Windows-arm64-intermediate-${{ github.run_id }}
          path: .build/artifacts/BundlePack-Windows-arm64
          if-no-files-found: error
          retention-days: 1
          compression-level: 6

      - name: Upload Windows compatibility fixtures
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: BundlePack-Windows-Fixtures-${{ github.sha }}
          path: .build/windows-fixtures
          if-no-files-found: error
          retention-days: 1

  windows-installer:
    needs: windows-test-and-build
    runs-on: windows-2022
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Download Windows x64 application
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: BundlePack-Windows-x64-intermediate-${{ github.run_id }}
          path: .build/artifacts/BundlePack-Windows-x64

      - name: Download Windows ARM64 application
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: BundlePack-Windows-arm64-intermediate-${{ github.run_id }}
          path: .build/artifacts/BundlePack-Windows-arm64

      - name: Build x64 and ARM64 installers
        shell: pwsh
        run: .\Windows\Scripts\Build-Installers.ps1

      - name: Test x64 install and uninstall
        shell: pwsh
        run: |
          .\Windows\Tests\Test-Installer.ps1 `
            -InstallerPath .\.build\installers\BundlePack-Setup-x64.exe

      - name: Upload Windows x64 test application
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: BundlePack-Windows-x64-${{ github.sha }}
          path: .build/artifacts/BundlePack-Windows-x64
          if-no-files-found: error
          retention-days: 7
          compression-level: 6

      - name: Upload Windows ARM64 test application
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: BundlePack-Windows-arm64-${{ github.sha }}
          path: .build/artifacts/BundlePack-Windows-arm64
          if-no-files-found: error
          retention-days: 7
          compression-level: 6

      - name: Upload Windows installers
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: BundlePack-Windows-Installers-${{ github.sha }}
          path: |
            .build/installers/BundlePack-Setup-x64.exe
            .build/installers/BundlePack-Setup-x64.exe.sha256
            .build/installers/BundlePack-Setup-arm64.exe
            .build/installers/BundlePack-Setup-arm64.exe.sha256
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  macos-test-and-build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Run smoke tests
        run: ./macOS/Scripts/test.sh

      - name: Build universal app
        run: ./macOS/Scripts/build.sh

      - name: Verify app bundle
        run: ./macOS/Scripts/verify-app.sh

      - name: Package macOS CI application
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: ./macOS/Scripts/package-artifact.sh

      - name: Upload macOS universal application
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: BundlePack-macOS-universal-${{ github.sha }}
          path: |
            .build/artifacts/BundlePack-macOS-universal.zip
            .build/artifacts/BundlePack-macOS-universal.zip.sha256
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  cross-platform-compatibility:
    needs:
      - windows-test-and-build
      - macos-test-and-build
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Download Windows compatibility fixtures
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: BundlePack-Windows-Fixtures-${{ github.sha }}
          path: .build/windows-fixtures

      - name: Open Windows fixtures on macOS
        run: ./macOS/Scripts/test-compatibility.sh
        env:
          BUNDLEPACK_WINDOWS_FIXTURES: .build/windows-fixtures
