name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run smoke tests
        run: ./Scripts/test.sh

      - name: Build universal app
        run: ./Scripts/build.sh

      - name: Verify app bundle
        run: |
          for binary in \
            .build/BundlePack.app/Contents/MacOS/BundlePack \
            .build/BundlePack.app/Contents/PlugIns/BundlePackThumbnail.appex/Contents/MacOS/BundlePackThumbnail
          do
            architectures="$(lipo -archs "$binary")"
            test "$architectures" = "x86_64 arm64" || test "$architectures" = "arm64 x86_64"
          done
          codesign --verify --deep --strict .build/BundlePack.app
          plutil -lint \
            .build/BundlePack.app/Contents/Info.plist \
            .build/BundlePack.app/Contents/PlugIns/BundlePackThumbnail.appex/Contents/Info.plist

      - name: Package CI artifact
        run: ditto -c -k --keepParent .build/BundlePack.app .build/BundlePack-ci.zip

      - name: Upload CI artifact
        uses: actions/upload-artifact@v5
        with:
          name: BundlePack-${{ github.sha }}
          path: .build/BundlePack-ci.zip
          if-no-files-found: error
          retention-days: 7
