name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-tests:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 10.0.x

      - name: Validate Windows PowerShell scripts
        shell: pwsh
        run: |
          $parseErrors = @()
          Get-ChildItem .\Windows -Filter *.ps1 -Recurse | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName,
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            $parseErrors += $errors
          }

          if ($parseErrors.Count -gt 0) {
            $parseErrors | ForEach-Object { Write-Host "::error::$($_.Message)" }
            throw "PowerShell script validation failed."
          }

      - name: Run Windows core tests
        shell: pwsh
        run: .\Windows\Scripts\Test.ps1 -CoreOnly

      - name: Upload Windows compatibility fixtures
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: BundlePack-Windows-Fixtures-${{ github.sha }}
          path: .build/windows-fixtures
          if-no-files-found: error
          retention-days: 1

  macos-tests:
    needs: windows-tests
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Download Windows compatibility fixtures
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: BundlePack-Windows-Fixtures-${{ github.sha }}
          path: .build/windows-fixtures

      - name: Run smoke tests
        run: ./macOS/Scripts/test.sh
        env:
          BUNDLEPACK_WINDOWS_FIXTURES: .build/windows-fixtures
