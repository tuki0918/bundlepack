name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-test-and-build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 10.0.x

      - name: Validate Windows PowerShell scripts
        shell: pwsh
        run: |
          $parseErrors = @()
          Get-ChildItem .\Windows -Filter *.ps1 -Recurse | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName,
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            $parseErrors += $errors
          }

          if ($parseErrors.Count -gt 0) {
            $parseErrors | ForEach-Object { Write-Host "::error::$($_.Message)" }
            throw "PowerShell script validation failed."
          }

      - name: Build and run Windows compatibility tests
        shell: pwsh
        run: |
          dotnet restore .\Windows\BundlePack.Windows.sln -p:NuGetAudit=true -p:NuGetAuditMode=all -p:Platform=x64
          dotnet build .\Windows\BundlePack.Core.Tests\BundlePack.Core.Tests.csproj -c Release
          dotnet run --project .\Windows\BundlePack.Core.Tests\BundlePack.Core.Tests.csproj -c Release --no-build -- --repo . --fixtures .\Tests\Compatibility --output .\.build\windows-fixtures

      - name: Build WinUI app (x64)
        shell: pwsh
        run: dotnet build .\Windows\BundlePack.Windows\BundlePack.Windows.csproj -c Release -p:Platform=x64

      - name: Build and test Explorer thumbnail provider (x64)
        shell: pwsh
        run: |
          dotnet run `
            --project .\Windows\BundlePack.Thumbnail.Tests\BundlePack.Thumbnail.Tests.csproj `
            -c Release `
            -p:Platform=x64 `
            -- `
            --fixtures .\.build\windows-fixtures `
            --fixtures .\Tests\Compatibility

      - name: Test Windows file association
        shell: pwsh
        run: |
          $executable = Get-ChildItem `
            .\Windows\BundlePack.Windows\bin\x64\Release `
            -Filter BundlePack.Windows.exe `
            -Recurse |
            Select-Object -First 1
          if ($null -eq $executable) {
            throw "The x64 BundlePack executable was not found."
          }

          $thumbnailProvider = Get-ChildItem `
            .\Windows\BundlePack.Thumbnail\bin\x64\Release `
            -Filter BundlePack.Thumbnail.comhost.dll `
            -Recurse |
            Select-Object -First 1
          if ($null -eq $thumbnailProvider) {
            throw "The x64 BundlePack thumbnail provider was not found."
          }

          .\Windows\Tests\Test-FileAssociation.ps1 `
            -ExecutablePath $executable.FullName `
            -ThumbnailProviderPath $thumbnailProvider.FullName

      - name: Build WinUI app (ARM64)
        shell: pwsh
        run: dotnet build .\Windows\BundlePack.Windows\BundlePack.Windows.csproj -c Release -p:Platform=ARM64

      - name: Build Explorer thumbnail provider (ARM64)
        shell: pwsh
        run: dotnet build .\Windows\BundlePack.Thumbnail\BundlePack.Thumbnail.csproj -c Release -p:Platform=ARM64

      - name: Prepare Windows CI applications
        shell: pwsh
        run: .\Windows\Scripts\Package-CIArtifacts.ps1

      - name: Upload Windows x64 application
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: BundlePack-Windows-x64-${{ github.sha }}
          path: .build/artifacts/BundlePack-Windows-x64
          if-no-files-found: error
          retention-days: 14
          compression-level: 6

      - name: Upload Windows ARM64 application
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: BundlePack-Windows-arm64-${{ github.sha }}
          path: .build/artifacts/BundlePack-Windows-arm64
          if-no-files-found: error
          retention-days: 14
          compression-level: 6

      - name: Upload Windows compatibility fixtures
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: BundlePack-Windows-Fixtures-${{ github.sha }}
          path: .build/windows-fixtures
          if-no-files-found: error
          retention-days: 7

  windows-installer:
    needs: windows-test-and-build
    runs-on: windows-2022
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Download Windows x64 application
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: BundlePack-Windows-x64-${{ github.sha }}
          path: .build/artifacts/BundlePack-Windows-x64

      - name: Download Windows ARM64 application
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: BundlePack-Windows-arm64-${{ github.sha }}
          path: .build/artifacts/BundlePack-Windows-arm64

      - name: Build x64 and ARM64 installers
        shell: pwsh
        run: .\Windows\Scripts\Build-Installers.ps1

      - name: Test x64 install and uninstall
        shell: pwsh
        run: |
          .\Windows\Tests\Test-Installer.ps1 `
            -InstallerPath .\.build\installers\BundlePack-Setup-x64.exe

      - name: Upload Windows installers
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: BundlePack-Windows-Installers-${{ github.sha }}
          path: |
            .build/installers/BundlePack-Setup-x64.exe
            .build/installers/BundlePack-Setup-x64.exe.sha256
            .build/installers/BundlePack-Setup-arm64.exe
            .build/installers/BundlePack-Setup-arm64.exe.sha256
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

  macos-test-and-build:
    needs: windows-test-and-build
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Download Windows compatibility fixtures
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: BundlePack-Windows-Fixtures-${{ github.sha }}
          path: .build/windows-fixtures

      - name: Run smoke tests
        run: ./Scripts/test.sh
        env:
          BUNDLEPACK_WINDOWS_FIXTURES: .build/windows-fixtures

      - name: Build universal app
        run: ./Scripts/build.sh

      - name: Verify app bundle
        run: |
          for binary in \
            .build/BundlePack.app/Contents/MacOS/BundlePack \
            .build/BundlePack.app/Contents/PlugIns/BundlePackThumbnail.appex/Contents/MacOS/BundlePackThumbnail
          do
            architectures="$(lipo -archs "$binary")"
            test "$architectures" = "x86_64 arm64" || test "$architectures" = "arm64 x86_64"
          done
          codesign --verify --deep --strict .build/BundlePack.app
          plutil -lint \
            .build/BundlePack.app/Contents/Info.plist \
            .build/BundlePack.app/Contents/PlugIns/BundlePackThumbnail.appex/Contents/Info.plist

      - name: Package macOS CI application
        run: |
          mkdir -p .build/artifacts
          ditto \
            -c -k --sequesterRsrc --keepParent \
            .build/BundlePack.app \
            .build/artifacts/BundlePack-macOS-universal.zip
          unzip -tq .build/artifacts/BundlePack-macOS-universal.zip
          cd .build/artifacts
          shasum -a 256 \
            BundlePack-macOS-universal.zip \
            > BundlePack-macOS-universal.zip.sha256

      - name: Upload macOS universal application
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: BundlePack-macOS-universal-${{ github.sha }}
          path: |
            .build/artifacts/BundlePack-macOS-universal.zip
            .build/artifacts/BundlePack-macOS-universal.zip.sha256
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
