name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-release-source:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out complete history
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Require release commit on the default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git fetch --no-tags origin \
            "refs/heads/$DEFAULT_BRANCH:refs/remotes/origin/$DEFAULT_BRANCH"
          git merge-base --is-ancestor "$GITHUB_SHA" "origin/$DEFAULT_BRANCH" || {
            echo "Tag $GITHUB_REF_NAME does not point to a commit on $DEFAULT_BRANCH." >&2
            exit 1
          }

  windows-release:
    needs: validate-release-source
    runs-on: windows-2022
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 10.0.x

      - name: Validate tag version
        shell: pwsh
        run: |
          $tagVersion = $env:GITHUB_REF_NAME.Substring(1)
          [xml]$props = Get-Content -LiteralPath .\Windows\Directory.Build.props -Raw
          $projectVersion = [string]$props.Project.PropertyGroup.VersionPrefix
          if ($tagVersion -ne $projectVersion) {
            throw "Tag $env:GITHUB_REF_NAME does not match Windows version $projectVersion."
          }

      - name: Run Windows tests and build x64 application
        shell: pwsh
        run: .\Windows\Scripts\Test.ps1 -Platform x64

      - name: Build ARM64 application and thumbnail provider
        shell: pwsh
        run: .\Windows\Scripts\Build.ps1 -Platforms ARM64

      - name: Prepare Windows applications
        shell: pwsh
        run: .\Windows\Scripts\Package-CIArtifacts.ps1

      - name: Build x64 and ARM64 installers
        shell: pwsh
        run: .\Windows\Scripts\Build-Installers.ps1

      - name: Test x64 install and uninstall
        shell: pwsh
        run: |
          .\Windows\Tests\Test-Installer.ps1 `
            -InstallerPath .\.build\installers\BundlePack-Setup-x64.exe

      - name: Package Windows release assets
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.Substring(1)
          .\Windows\Scripts\Package-ReleaseAssets.ps1 `
            -Version $version

      - name: Upload Windows release assets for publishing
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: BundlePack-Release-Assets-Windows-${{ github.sha }}
          path: .build/release-assets
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

      - name: Upload Windows compatibility fixtures
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: BundlePack-Release-Fixtures-${{ github.sha }}
          path: .build/windows-fixtures
          if-no-files-found: error
          retention-days: 1

  macos-release:
    needs: validate-release-source
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Validate synchronized metadata and tag version
        run: |
          ./Scripts/verify-project-metadata.sh
          version="$(plutil -extract CFBundleShortVersionString raw macOS/BundlePack/App/Info.plist)"
          test "$GITHUB_REF_NAME" = "v$version" || {
            echo "Tag $GITHUB_REF_NAME does not match macOS version $version." >&2
            exit 1
          }

      - name: Run macOS smoke tests
        run: ./macOS/Scripts/test.sh

      - name: Build universal application
        run: ./macOS/Scripts/build.sh

      - name: Verify application bundle
        run: ./macOS/Scripts/verify-app.sh

      - name: Package macOS release assets
        run: |
          BUNDLEPACK_ARTIFACT_VERSION="${GITHUB_REF_NAME#v}" \
            ./macOS/Scripts/package-artifact.sh
        env:
          BUNDLEPACK_ARTIFACT_DIR: .build/release-assets

      - name: Upload macOS release assets for publishing
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: BundlePack-Release-Assets-macOS-${{ github.sha }}
          path: .build/release-assets
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  release-compatibility:
    needs: windows-release
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Download Windows compatibility fixtures
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: BundlePack-Release-Fixtures-${{ github.sha }}
          path: .build/windows-fixtures

      - name: Open Windows release fixtures on macOS
        run: ./macOS/Scripts/test-compatibility.sh
        env:
          BUNDLEPACK_WINDOWS_FIXTURES: .build/windows-fixtures

  publish-release:
    needs:
      - windows-release
      - macos-release
      - release-compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Download release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: BundlePack-Release-Assets-*-${{ github.sha }}
          path: .release-assets
          merge-multiple: true

      - name: Attest release binaries and archives
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: |
            .release-assets/*.zip
            .release-assets/*.exe

      - name: Create or update GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_NOTES: |
            > [!WARNING]
            > These automated binaries are testing builds. The macOS application is ad-hoc signed and not notarized; the Windows applications and installers are unsigned.

            Verify a downloaded ZIP or EXE with `gh attestation verify <asset> -R ${{ github.repository }}`.
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" .release-assets/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" .release-assets/* \
              --verify-tag \
              --prerelease \
              --generate-notes \
              --notes "$RELEASE_NOTES" \
              --title "BundlePack $GITHUB_REF_NAME"
          fi
